version: "3.9"

services:
  workspace:
    image: mcr.microsoft.com/devcontainers/python:1-3.11-bullseye
    volumes:
      - .:/workspaces/${localWorkspaceFolderBasename}:cached
    command: sleep infinity
    depends_on:
      - backend
      - frontend
    networks:
      - appnet

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      PYTHONUNBUFFERED: "1"
    working_dir: /app
    volumes:
      - ./backend:/app:cached
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
    working_dir: /app
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - appnet

networks:
  appnet:
    driver: bridge